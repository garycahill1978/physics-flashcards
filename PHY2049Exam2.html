<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Physics Flashcards</title>




  <style>
    body { font-family: Arial, sans-serif; background:#f8f9fa; margin:0; color:#111827; }

    .page-title { text-align:center; padding:20px 12px 10px; }
    .page-title h1 { margin:0; font-size:1.6em; }
    .page-title p { margin:8px 0 0; color:#4b5563; }

    .controls {
      text-align:center; padding:15px; position:sticky; top:0; background:#f8f9fa;
      z-index:1000; border-bottom:1px solid #e5e7eb; box-shadow:0 2px 8px rgba(0,0,0,.06);
    }

    .control-row { margin:6px 0; }
    select, button {
      padding:10px 15px; margin:5px; font-size:16px; border-radius:10px;
      border:1px solid #d1d5db; background:white; cursor:pointer;
    }
    button:hover { background:#f3f4f6; }

    .topic-label { display:block; margin-top:10px; font-size:.9em; color:#4b5563; }
    .topic-buttons { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; margin-top:8px; }
    .topic-btn { padding:8px 12px; font-size:14px; border-radius:999px; }
    .topic-btn.active { background:#111827; color:white; border-color:#111827; }

    #flashcard-container { display:flex; flex-wrap:wrap; justify-content:center; padding:14px; }

    .flashcard { background:transparent; width:320px; height:340px; perspective:1000px; margin:12px; }
    .inner { position:relative; width:100%; height:100%; text-align:center; transition:transform .6s; transform-style:preserve-3d; }
    .flashcard:hover .inner { transform:rotateY(180deg); }

    .front, .back {
      position:absolute; width:100%; height:100%; backface-visibility:hidden;
      display:flex; justify-content:flex-start; align-items:center; flex-direction:column;
      box-sizing:border-box; overflow-y:auto; padding:14px; gap:8px;
      box-shadow:0 4px 10px rgba(0,0,0,.18); border-radius:12px; font-size:.98em;
    }

    .front { background:white; font-weight:700; }
    .back { background:#dfefff; transform:rotateY(180deg); font-weight:400; }

    .topic-tag {
      font-size:.78em; color:#374151; background:#eef2ff; border:1px solid #c7d2fe;
      padding:3px 8px; border-radius:999px; margin-bottom:4px;
    }

    .term { font-size:1.04em; line-height:1.25em; }
    .answer { font-size:.96em; line-height:1.25em; }

    .equation {
      margin-top:6px; padding:6px 8px; border-radius:10px;
      background:rgba(255,255,255,.6); border:1px dashed rgba(17,24,39,.25);
      font-family:"Courier New", monospace; font-size:.9em;
    }

    .diagram {
      width:100%; max-height:140px; overflow:hidden;
      display:flex; justify-content:center; align-items:center;
      pointer-events:none; flex:0 0 auto;
    }
    .diagram svg { max-width:100%; max-height:140px; height:auto; pointer-events:none; }

    .rating-buttons {
      margin-top:auto; padding-top:8px; display:flex; gap:6px; flex-wrap:wrap;
      justify-content:center; background:rgba(223,239,255,.95); width:100%;
    }
    .rating-buttons button { margin:0; padding:6px 10px; font-size:.8em; }

    .small-note { font-size:.82em; color:#374151; }

    @media (max-width: 520px) {
      .flashcard { width:calc(100vw - 34px); height:360px; }
      .controls { position:static; }
    }
  </style>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>

<body>

<div class="page-title">

<h1>PHY 2049 Set 2 Flashcards</h1>
<p>Electric fields, potential, capacitance and DC circuits.</p>

<div class="controls">
  <div class="control-row">
    <label for="rating-filter">Confidence filter:</label>

      <option value="yellow">Yellow — nearly there</option>

  <div class="control-row">
    <label for="cardOrder">Card order:</label>

  </div>

  <span class="topic-label">Topic filter:</span>
  <div id="topic-buttons" class="topic-buttons"></div>

  <div class="control-row">

</div>

let cards = flashcards;
let selectedTopics = new Set();

function topicCounts() {
  const counts = {};
  cards.forEach(card => {
    counts[card.topic] = (counts[card.topic] || 0) + 1;
  });
  return counts;
}

function renderTopicButtons() {
  const holder = document.getElementById("topic-buttons");
  const counts = topicCounts();
  const topics = [...new Set(cards.map(card => card.topic))].sort();
  const allActive = selectedTopics.size === 0;

  holder.innerHTML = `
    <button class="topic-btn ${allActive ? "active" : ""}" onclick="toggleTopic('all')">
      All (${cards.length})
    </button>

    ${topics.map(topic => `
      <button class="topic-btn ${selectedTopics.has(topic) ? "active" : ""}"
              onclick="toggleTopic('${topic.replace(/'/g, "\\'")}')">
        ${topic} (${counts[topic]})
      </button>
    `).join("")}
  `;
}

function toggleTopic(topic) {
  if (topic === "all") {
    selectedTopics.clear();
  } else if (selectedTopics.has(topic)) {
    selectedTopics.delete(topic);
  } else {
    selectedTopics.add(topic);
  }

  renderTopicButtons();
  displayFlashcards();
}

function setRating(index, colour) {
  localStorage.setItem("rating_" + cards[index].term, colour);
  displayFlashcards();
}

function getRating(term) {
  return localStorage.getItem("rating_" + term);
}

function clearRatings() {
  cards.forEach(card => localStorage.removeItem("rating_" + card.term));
  displayFlashcards();
}

function frontBlock(card, showTermFirst) {
  if (showTermFirst) {
    return `
      <div class="topic-tag">${card.topic}</div>
      <div class="term">${card.term}</div>
    `;
  }

  return `
    <div class="topic-tag">${card.topic}</div>
    <div class="answer">${card.answer}</div>
    ${card.equation ? `<div class="equation">$$${card.equation}$$</div>` : ""}
    ${card.svg ? `<div class="diagram">${card.svg}</div>` : ""}
    <div class="small-note">Hover or tap to reveal the question.</div>
  `;
}

function backBlock(card, showTermFirst) {
  if (showTermFirst) {
    return `
      <div class="answer">${card.answer}</div>
      ${card.equation ? `<div class="equation">$$${card.equation}$$</div>` : ""}
      ${card.svg ? `<div class="diagram">${card.svg}</div>` : ""}
    `;
  }

  return `
    <div class="topic-tag">${card.topic}</div>
    <div class="term">${card.term}</div>
  `;
}

function displayFlashcards() {
  const container = document.getElementById("flashcard-container");
  const selectedRating = document.getElementById("rating-filter").value;
  const showTermFirst = document.getElementById("cardOrder").value === "term";

  container.innerHTML = "";

  cards.forEach((card, index) => {
    const rating = getRating(card.term);
    const ratingOk = selectedRating === "all" || rating === selectedRating;
    const topicOk = selectedTopics.size === 0 || selectedTopics.has(card.topic);

    if (!ratingOk || !topicOk) return;

    const cardEl = document.createElement("div");
    cardEl.className = "flashcard";

    if (rating) cardEl.style.border = "4px solid " + rating;

    cardEl.innerHTML = `
      <div class="inner">
        <div class="front">${frontBlock(card, showTermFirst)}</div>
        <div class="back">
          ${backBlock(card, showTermFirst)}
          <div class="rating-buttons">
            <button onclick="setRating(${index}, 'red')">Red</button>
            <button onclick="setRating(${index}, 'yellow')">Yellow</button>
            <button onclick="setRating(${index}, 'green')">Green</button>
          </div>
        </div>
      </div>
    `;

    container.appendChild(cardEl);
  });

  if (window.MathJax && window.MathJax.typesetPromise) {
    MathJax.typesetPromise([container]);
  }
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function shuffleAndDisplay() {
  shuffle(cards);
  renderTopicButtons();
  displayFlashcards();
}

renderTopicButtons();
displayFlashcards();
</script>
