<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blackbody + Brownian + Emission Animation</title>
<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .wrap { width: min(1100px, 100%); }

  canvas {
    width: 100%;
    height: 650px;
    background: #000;
    border-radius: 12px;
    display: block;
  }

  .controls {
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
  }

  label {
    display: flex;
    align-items: center;
    gap: 6px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="controls">
    <label>
      Temperature
      <input id="temp" type="range" min="300" max="8000" value="3000" step="50">
    </label>

    <label>
      Particles
      <input id="npart" type="range" min="10" max="120" value="35" step="5">
      <span id="nval">35</span>
    </label>

    <label>
      <input id="emitToggle" type="checkbox" checked>
      emit events
    </label>

    <label>
      <input id="waveToggle" type="checkbox" checked>
      show radiating fields
    </label>

    <label>
      Mode:
      <select id="modeSelect">
        <option value="photons">photons (directional)</option>
        <option value="waves">circular wavefronts</option>
      </select>
    </label>

    <label>
      <input id="absorbToggle" type="checkbox" checked>
      photons absorbed by particles
    </label>
  </div>

  <canvas id="c"></canvas>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const tempSlider = document.getElementById("temp");
const emitToggle = document.getElementById("emitToggle");
const waveToggle = document.getElementById("waveToggle");
const npartSlider = document.getElementById("npart");
const modeSelect = document.getElementById("modeSelect");
const absorbToggle = document.getElementById("absorbToggle");
const nval = document.getElementById("nval");

let particles = [];
let waves = [];
let lastCssWidth = 0;
let lastCssHeight = 0;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (rect.width === lastCssWidth && rect.height === lastCssHeight) return;

  lastCssWidth = rect.width;
  lastCssHeight = rect.height;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function init(count = 35) {
  particles = [];
  waves = [];

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.002 + Math.random() * 0.002;
    particles.push({
      x: Math.random(),
      y: Math.random(),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      ax: 0,
      ay: 0,
      charge: Math.random() < 0.5 ? 1 : -1
    });
  }
}

function handleCollisions() {
  const radius = 0.015;
  const minDist = radius * 2;

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const p1 = particles[i];
      const p2 = particles[j];
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const dist = Math.hypot(dx, dy);

      if (dist > 0 && dist < minDist) {
        const nx = dx / dist;
        const ny = dy / dist;
        const tx = -ny;
        const ty = nx;

        const v1n = p1.vx * nx + p1.vy * ny;
        const v1t = p1.vx * tx + p1.vy * ty;
        const v2n = p2.vx * nx + p2.vy * ny;
        const v2t = p2.vx * tx + p2.vy * ty;

        const old1x = p1.vx;
        const old1y = p1.vy;
        const old2x = p2.vx;
        const old2y = p2.vy;

        // Equal masses: swap normal components, keep tangential components.
        p1.vx = v2n * nx + v1t * tx;
        p1.vy = v2n * ny + v1t * ty;
        p2.vx = v1n * nx + v2t * tx;
        p2.vy = v1n * ny + v2t * ty;

        // Separate overlapping particles so they do not stick together.
        const overlap = minDist - dist;
        p1.x -= nx * overlap / 2;
        p1.y -= ny * overlap / 2;
        p2.x += nx * overlap / 2;
        p2.y += ny * overlap / 2;

        p1.x = Math.max(0, Math.min(1, p1.x));
        p1.y = Math.max(0, Math.min(1, p1.y));
        p2.x = Math.max(0, Math.min(1, p2.x));
        p2.y = Math.max(0, Math.min(1, p2.y));

        // Collision impulse, used as a visual acceleration proxy.
        p1.ax = p1.vx - old1x;
        p1.ay = p1.vy - old1y;
        p2.ax = p2.vx - old2x;
        p2.ay = p2.vy - old2y;
      }
    }
  }
}

function maybeEmitFromParticle(p) {
  const accel = Math.hypot(p.ax, p.ay);
  const power = accel * accel; // Larmor-inspired: P ∝ a².
  const emissionProbability = Math.min(0.6, power * 90000);

  if (emitToggle.checked && Math.random() < emissionProbability) {
    const angle = Math.atan2(p.ay, p.ax);

    // Radiation carries energy away, so reduce particle kinetic energy slightly.
    const lossFactor = Math.min(0.15, power * 5000);
    p.vx *= (1 - lossFactor);
    p.vy *= (1 - lossFactor);

    waves.push({
      x: p.x,
      y: p.y,
      r: 0,
      life: Math.min(1, 0.35 + power * 120000),
      a: accel,
      angle
    });
  }
}

function absorbPhotons() {
  if (!absorbToggle.checked || modeSelect.value !== "photons") return;

  const absorbRadius = 0.015;
  const rect = canvas.getBoundingClientRect();

  for (let wi = 0; wi < waves.length; wi++) {
    const w = waves[wi];
    if (w.life <= 0 || w.r <= 0.5) continue;

    // Current visible photon tip position in normalized coordinates.
    const aNorm = Math.min(1, w.a * 250);
    const len = 20 + 40 * aNorm;
    const travel = w.r * len * 0.05;
    const tipX = w.x + Math.cos(w.angle) * travel / Math.max(1, rect.width);
    const tipY = w.y + Math.sin(w.angle) * travel / Math.max(1, rect.height);

    for (let pi = 0; pi < particles.length; pi++) {
      const p = particles[pi];
      const d = Math.hypot(p.x - tipX, p.y - tipY);

      if (d < absorbRadius) {
        const k = 0.0015;
        const dvx = Math.cos(w.angle) * k * (1 + 20 * w.a);
        const dvy = Math.sin(w.angle) * k * (1 + 20 * w.a);

        const oldVx = p.vx;
        const oldVy = p.vy;

        p.vx += dvx;
        p.vy += dvy;

        // Limit velocity to prevent runaway feedback.
        const vmax = 0.02;
        const vmag = Math.hypot(p.vx, p.vy);
        if (vmag > vmax) {
          p.vx = (p.vx / vmag) * vmax;
          p.vy = (p.vy / vmag) * vmax;
        }

        p.ax = p.vx - oldVx;
        p.ay = p.vy - oldVy;

        w.life = 0;
        break;
      }
    }
  }
}

function step(T) {
  const speedScale = Math.sqrt(T / 300);

  particles.forEach(p => {
    p.x += p.vx * speedScale;
    p.y += p.vy * speedScale;

    if (p.x < 0 || p.x > 1) {
      const oldVx = p.vx;
      p.vx *= -1;
      p.ax = p.vx - oldVx;
    }
    if (p.y < 0 || p.y > 1) {
      const oldVy = p.vy;
      p.vy *= -1;
      p.ay = p.vy - oldVy;
    }

    p.x = Math.max(0, Math.min(1, p.x));
    p.y = Math.max(0, Math.min(1, p.y));
  });

  handleCollisions();

  particles.forEach(p => {
    maybeEmitFromParticle(p);
    p.ax *= 0.5;
    p.ay *= 0.5;
  });

  // Photons/radiation propagate much faster than particles.
  waves.forEach(w => {
    w.r += 4.0;
    w.life *= 0.992;
  });

  absorbPhotons();
  waves = waves.filter(w => w.life > 0.05);
}

function drawDirectionalEmission(w, W, H) {
  const aNorm = Math.min(1, w.a * 250);
  const hue = 240 * aNorm;
  const len = 20 + 40 * aNorm;

  const x1 = w.x * W;
  const y1 = w.y * H;
  const distance = w.r * len * 0.05;
  const x2 = x1 + Math.cos(w.angle) * distance;
  const y2 = y1 + Math.sin(w.angle) * distance;

  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = `hsla(${hue},100%,65%,${w.life})`;
  ctx.lineWidth = 1.2 + 3 * aNorm;
  ctx.stroke();
}

function drawCircularWave(w, W, H) {
  const aNorm = Math.min(1, w.a * 250);
  const hue = 240 * aNorm;
  ctx.beginPath();
  ctx.arc(w.x * W, w.y * H, w.r, 0, 2 * Math.PI);
  ctx.strokeStyle = `hsla(${hue},100%,65%,${w.life})`;
  ctx.lineWidth = 1.2 + 3 * aNorm;
  ctx.stroke();
}

function draw() {
  resize();
  const rect = canvas.getBoundingClientRect();
  const W = rect.width;
  const H = rect.height;

  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, W, H);

  const T = Number(tempSlider.value);
  step(T);

  if (waveToggle.checked) {
    waves.forEach(w => {
      if (modeSelect.value === "waves") drawCircularWave(w, W, H);
      else drawDirectionalEmission(w, W, H);
    });
  }

  particles.forEach(p => {
    const accel = Math.hypot(p.ax, p.ay);
    const aNorm = Math.min(1, accel * 250);
    const hue = 240 * aNorm;

    ctx.fillStyle = `hsl(${hue},100%,60%)`;
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, 3, 0, 2 * Math.PI);
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.75)";
    ctx.font = "9px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(p.charge > 0 ? "+" : "−", p.x * W, p.y * H);
  });

  ctx.fillStyle = "#fff";
  ctx.font = "16px system-ui";
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
  ctx.fillText("Charged particles: straight-line motion → elastic collisions → acceleration² radiation", 20, 24);
}

function loop() {
  draw();
  requestAnimationFrame(loop);
}

npartSlider.addEventListener("input", () => {
  const n = Number(npartSlider.value);
  nval.textContent = n;
  init(n);
});

function runTests() {
  init(10);
  console.assert(particles.length === 10, "init works");
  console.assert(particles.every(p => p.charge === 1 || p.charge === -1), "particles have charges");

  handleCollisions();
  step(300);
  console.assert(particles.every(p => Number.isFinite(p.x) && Number.isFinite(p.y)), "particle positions remain finite");
  console.assert(particles.every(p => p.x >= 0 && p.x <= 1 && p.y >= 0 && p.y <= 1), "particles remain inside bounds");

  const before = waves.length;
  waves.push({ x: 0.5, y: 0.5, r: 0, life: 1, a: 0.01, angle: 0 });
  const after = waves.length;
  console.assert(after === before + 1, "waves can be added");
  console.assert(modeSelect instanceof HTMLSelectElement, "mode selector exists");
  console.assert(absorbToggle instanceof HTMLInputElement, "absorb toggle exists");

  init(1);
  const p = particles[0];
  p.x = 0.5; p.y = 0.5; p.vx = 0; p.vy = 0;
  waves = [{ x: 0.49, y: 0.5, r: 5, life: 1, a: 0.02, angle: 0 }];
  modeSelect.value = "photons";
  absorbToggle.checked = true;
  const vBefore = Math.hypot(p.vx, p.vy);
  absorbPhotons();
  const vAfter = Math.hypot(p.vx, p.vy);
  console.assert(vAfter >= vBefore, "absorption increases particle speed or leaves it same");
  waves = [];
}

runTests();
init(Number(npartSlider.value));
nval.textContent = npartSlider.value;
loop();
</script>
</body>
</html>
